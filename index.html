<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustLand | Stop Land Fraud. Forever.</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/11.3.0/stellar-sdk.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0A0A0F',
                        surface: '#111118',
                        border: '#1E1E2E',
                        primary: {
                            DEFAULT: '#6C63FF',
                            hover: '#5A52E5',
                        },
                        secondary: '#00D4AA',
                        danger: '#FF4757',
                        warning: '#FFA502',
                        muted: '#8888AA',
                        accent: '#F0F0FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                        'hero-gradient': 'linear-gradient(135deg, #6C63FF 0%, #00D4AA 100%)',
                    },
                    animation: {
                        'slow-pulse': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        @layer base {
            body {
                @apply bg-background text-accent font-sans selection:bg-primary selection:text-white;
                overflow-x: hidden;
            }
        }

        .glass {
            background: rgba(17, 17, 24, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #1E1E2E;
        }

        .glass-hover {
            transition: all 0.3s ease;
        }

        .glass-hover:hover {
            background: rgba(25, 25, 35, 0.9);
            border-color: #6C63FF;
            transform: translateY(-2px);
        }

        .animated-gradient-text {
            background: linear-gradient(to right, #6C63FF, #00D4AA, #6C63FF);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s linear infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0A0A0F;
        }
        ::-webkit-scrollbar-thumb {
            background: #1E1E2E;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6C63FF;
        }

        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- UI COMPONENTS ---

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Button = ({ children, onClick, variant = 'primary', className = "", isLoading = false, disabled = false, icon = null }) => {
            const baseStyles = "px-6 py-3 rounded-xl font-semibold transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed active:scale-95";
            const variants = {
                primary: "bg-primary text-white hover:bg-primary-hover shadow-lg shadow-primary/20",
                secondary: "bg-surface border border-border text-accent hover:border-primary",
                outline: "border-2 border-primary text-primary hover:bg-primary hover:text-white",
                ghost: "text-muted hover:text-accent hover:bg-surface/50",
                danger: "bg-danger text-white hover:opacity-90",
                success: "bg-secondary text-white hover:opacity-90"
            };

            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled || isLoading}
                    className={`${baseStyles} ${variants[variant]} ${className}`}
                >
                    {isLoading ? (
                        <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    ) : (
                        <>
                            {icon && <Icon name={icon} size={20} />}
                            {children}
                        </>
                    )}
                </button>
            );
        };

        const Card = ({ children, className = "" }) => (
            <div className={`glass rounded-2xl p-6 ${className}`}>
                {children}
            </div>
        );

        const Toast = ({ message, type = 'info', onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 5000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const colors = {
                success: 'border-secondary bg-secondary/10 text-secondary',
                error: 'border-danger bg-danger/10 text-danger',
                info: 'border-primary bg-primary/10 text-primary',
                warning: 'border-warning bg-warning/10 text-warning'
            };

            const icons = {
                success: 'check-circle',
                error: 'alert-circle',
                info: 'info',
                warning: 'alert-triangle'
            };

            return (
                <div className={`flex items-center gap-3 px-4 py-3 rounded-lg border-l-4 glass ${colors[type]} animate-in slide-in-from-right fade-in duration-300`}>
                    <Icon name={icons[type]} size={20} />
                    <span className="text-sm font-medium">{message}</span>
                    <button onClick={onClose} className="ml-2 hover:opacity-70">
                        <Icon name="x" size={16} />
                    </button>
                </div>
            );
        };

        // --- DASHBOARD WRAPPER ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('landing');
            const [user, setUser] = useState(null);
            const [toasts, setToasts] = useState([]);
            const [isSideNavOpen, setIsSideNavOpen] = useState(false);

            useEffect(() => {
                const storedUser = localStorage.getItem('trustland_user');
                if (storedUser) {
                    setUser(JSON.parse(storedUser));
                }
            }, []);

            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };

            const removeToast = (id) => {
                setToasts(prev => prev.filter(t => t.id !== id));
            };

            const logout = () => {
                localStorage.removeItem('trustland_user');
                setUser(null);
                setCurrentPage('landing');
                addToast("Logged out successfully", "info");
            };

            const navigate = (page) => {
                setCurrentPage(page);
                setIsSideNavOpen(false);
                window.scrollTo(0, 0);
            };

            // Shared Layout
            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 glass border-b border-border/50">
                        <div className="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => navigate('landing')}>
                                <div className="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
                                    <Icon name="shield-check" size={24} className="text-white" />
                                </div>
                                <span className="text-2xl font-extrabold tracking-tight">Trust<span className="text-primary font-black">Land</span></span>
                            </div>

                            {/* Desktop Nav */}
                            <div className="hidden md:flex items-center gap-8">
                                <button onClick={() => navigate('landing')} className={`hover:text-primary transition-colors ${currentPage === 'landing' ? 'text-primary' : 'text-muted'}`}>Home</button>
                                <button onClick={() => navigate('verify')} className={`hover:text-primary transition-colors ${currentPage === 'verify' ? 'text-primary' : 'text-muted'}`}>Verify</button>
                                {user ? (
                                    <>
                                        <button onClick={() => navigate('dashboard')} className={`hover:text-primary transition-colors ${currentPage === 'dashboard' ? 'text-primary' : 'text-muted'}`}>Dashboard</button>
                                        <div className="h-6 w-px bg-border"></div>
                                        <div className="flex items-center gap-3 pl-2">
                                            <div className="w-8 h-8 rounded-full bg-primary/20 border border-primary/50 flex items-center justify-center">
                                                <Icon name="user" size={16} className="text-primary" />
                                            </div>
                                            <Button variant="ghost" className="px-2" onClick={logout}>Logout</Button>
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex items-center gap-4">
                                        <Button variant="ghost" onClick={() => navigate('login')}>Login</Button>
                                        <Button onClick={() => navigate('signup')}>Get Started</Button>
                                    </div>
                                )}
                            </div>

                            {/* Mobile Menu Toggle */}
                            <div className="md:hidden">
                                <button onClick={() => setIsSideNavOpen(!isSideNavOpen)} className="p-2 text-muted hover:text-accent">
                                    <Icon name={isSideNavOpen ? "x" : "menu"} />
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    {isSideNavOpen && (
                        <div className="fixed inset-0 z-40 md:hidden glass mt-20 animate-in fade-in slide-in-from-top duration-300">
                             <div className="flex flex-col p-6 gap-6">
                                <button onClick={() => navigate('landing')} className="text-xl font-medium text-left">Home</button>
                                <button onClick={() => navigate('verify')} className="text-xl font-medium text-left">Verify Document</button>
                                {user ? (
                                    <>
                                        <button onClick={() => navigate('dashboard')} className="text-xl font-medium text-left">My Dashboard</button>
                                        <button onClick={logout} className="text-xl font-medium text-left text-danger">Logout</button>
                                    </>
                                ) : (
                                    <>
                                        <button onClick={() => navigate('login')} className="text-xl font-medium text-left">Login</button>
                                        <Button onClick={() => navigate('signup')}>Get Started</Button>
                                    </>
                                )}
                             </div>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <main className="flex-grow pt-20">
                        {currentPage === 'landing' && <LandingPage navigate={navigate} />}
                        {currentPage === 'login' && <LoginPage navigate={navigate} setUser={setUser} addToast={addToast} />}
                        {currentPage === 'signup' && <SignupPage navigate={navigate} setUser={setUser} addToast={addToast} />}
                        {currentPage === 'dashboard' && <DashboardPage navigate={navigate} user={user} addToast={addToast} />}
                        {currentPage === 'register' && <RegisterPage navigate={navigate} user={user} addToast={addToast} />}
                        {currentPage === 'verify' && <VerifyPage navigate={navigate} addToast={addToast} />}
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-border mt-20 py-12 glass">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <div className="flex items-center justify-center gap-2 mb-6 opacity-60">
                                <Icon name="shield-check" size={20} className="text-primary" />
                                <span className="font-bold">TrustLand Protocol</span>
                            </div>
                            <p className="text-muted text-sm px-4 max-w-md mx-auto">
                                Securing global land ownership through Immutable SHA-256 Hashes on the Stellar Blockchain.
                            </p>
                            <div className="mt-8 flex justify-center gap-6 text-muted">
                                <a href="#" className="hover:text-primary underline">Stellar Expert</a>
                                <a href="#" className="hover:text-primary underline">Doc Documentation</a>
                                <a href="#" className="hover:text-primary underline">Github</a>
                            </div>
                            <p className="mt-12 text-xs text-muted/50">
                                &copy; 2026 TrustLand. Built for the future of Real Estate.
                            </p>
                        </div>
                    </footer>

                    {/* Toast Provider */}
                    <div className="fixed top-24 right-4 z-[100] flex flex-col gap-3">
                        {toasts.map(toast => (
                            <Toast key={toast.id} {...toast} onClose={() => removeToast(toast.id)} />
                        ))}
                    </div>
                </div>
            );
        };

        // --- PAGE COMPONENTS ---

        const LandingPage = ({ navigate }) => (
            <div className="flex flex-col">
                {/* Hero Section */}
                <section className="relative overflow-hidden py-24 md:py-40">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/20 blur-[150px] rounded-full animate-slow-pulse -z-10"></div>
                    
                    <div className="max-w-7xl mx-auto px-4 text-center">
                        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full glass mb-8 animate-in slide-in-from-top duration-700">
                             <div className="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
                             <span className="text-xs font-bold tracking-widest uppercase">Live on Stellar Testnet</span>
                        </div>
                        
                        <h1 className="text-5xl md:text-8xl font-black mb-6 leading-tight tracking-tighter">
                            <span className="animated-gradient-text">Stop Land Fraud.</span><br/>
                            Forever.
                        </h1>
                        
                        <p className="text-lg md:text-2xl text-muted max-w-3xl mx-auto mb-12 leading-relaxed">
                            TrustLand secures property deeds by generating unique cryptographic SHA-256 hashes and anchoring them permanently to the Stellar Blockchain.
                        </p>
                        
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                            <Button className="w-full sm:w-auto text-lg h-16 px-10" onClick={() => navigate('signup')}>Register My Document</Button>
                            <Button variant="secondary" className="w-full sm:w-auto text-lg h-16 px-10" onClick={() => navigate('verify')}>Verify Authenticity</Button>
                        </div>

                        <div className="mt-20 grid grid-cols-1 md:grid-cols-3 gap-8 max-w-5xl mx-auto text-left">
                            <Card className="glass-hover">
                                <div className="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center mb-4 border border-primary/20">
                                    <Icon name="hash" className="text-primary" />
                                </div>
                                <h3 className="text-xl font-bold mb-2">Upload & Hash</h3>
                                <p className="text-muted text-sm">Your document never leaves your device. We generate a local hash to ensure maximum privacy.</p>
                            </Card>
                            <Card className="glass-hover">
                                <div className="w-12 h-12 bg-secondary/10 rounded-lg flex items-center justify-center mb-4 border border-secondary/20">
                                    <Icon name="database" className="text-secondary" />
                                </div>
                                <h3 className="text-xl font-bold mb-2">On-Chain Record</h3>
                                <p className="text-muted text-sm">Hashes are recorded on the Stellar Testnet ledger, creating a permanent, timestamped audit trail.</p>
                            </Card>
                            <Card className="glass-hover">
                                <div className="w-12 h-12 bg-warning/10 rounded-lg flex items-center justify-center mb-4 border border-warning/20">
                                    <Icon name="search" className="text-warning" />
                                </div>
                                <h3 className="text-xl font-bold mb-2">Public Verification</h3>
                                <p className="text-muted text-sm">Anyone with the original file can instantly verify its authenticity against the global ledger.</p>
                            </Card>
                        </div>
                    </div>
                </section>

                {/* Stats Bar */}
                <div className="border-y border-border py-12 bg-surface/30">
                    <div className="max-w-7xl mx-auto px-4 flex flex-wrap justify-center gap-12 md:gap-32">
                        <div className="text-center">
                            <p className="text-3xl md:text-5xl font-black text-accent mb-2 tracking-tighter">1,240+</p>
                            <p className="text-muted text-xs uppercase tracking-widest font-bold">Documents Secured</p>
                        </div>
                        <div className="text-center">
                            <p className="text-3xl md:text-5xl font-black text-secondary mb-2 tracking-tighter">100%</p>
                            <p className="text-muted text-xs uppercase tracking-widest font-bold">Fraud Proof</p>
                        </div>
                        <div className="text-center">
                            <p className="text-3xl md:text-5xl font-black text-primary mb-2 tracking-tighter">0.02s</p>
                            <p className="text-muted text-xs uppercase tracking-widest font-bold">Verification Speed</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const LoginPage = ({ navigate, setUser, addToast }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                const storedUser = localStorage.getItem('trustland_user');
                if (storedUser) {
                    const parsed = JSON.parse(storedUser);
                    if (parsed.email === email && parsed.password === password) {
                        setUser(parsed);
                        addToast("Welcome back!", "success");
                        navigate('dashboard');
                        return;
                    }
                }
                addToast("Invalid email or password", "error");
            };

            return (
                <div className="max-w-md mx-auto px-4 py-20 flex flex-col justify-center min-h-[70vh]">
                    <Card className="shimmer">
                        <div className="mb-10 text-center">
                            <h2 className="text-3xl font-black mb-2">Back to Safety</h2>
                            <p className="text-muted">Access your land registry dashboard</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div>
                                <label className="block text-sm font-bold mb-2 text-muted uppercase tracking-wider">Email Address</label>
                                <input 
                                    type="email" 
                                    required
                                    className="w-full bg-background border border-border rounded-xl px-4 py-3 focus:border-primary outline-none transition-all text-white"
                                    placeholder="name@example.com"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-2 text-muted uppercase tracking-wider">Password</label>
                                <input 
                                    type="password" 
                                    required
                                    className="w-full bg-background border border-border rounded-xl px-4 py-3 focus:border-primary outline-none transition-all text-white"
                                    placeholder="••••••••"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                />
                            </div>
                            <Button type="submit" className="w-full h-14 text-lg">Sign In</Button>
                        </form>
                        <p className="mt-8 text-center text-muted">
                            Don't have an account? <button onClick={() => navigate('signup')} className="text-primary hover:underline font-bold">Sign Up Free</button>
                        </p>
                    </Card>
                </div>
            );
        };

        const SignupPage = ({ navigate, setUser, addToast }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [step, setStep] = useState(1);
            const [keypair, setKeypair] = useState(null);
            const [isLoading, setIsLoading] = useState(false);

            const generateWallet = (e) => {
                e.preventDefault();
                setIsLoading(true);
                setTimeout(() => {
                    const pair = StellarSdk.Keypair.random();
                    setKeypair({
                        publicKey: pair.publicKey(),
                        secret: pair.secret()
                    });
                    setStep(2);
                    setIsLoading(false);
                }, 1500);
            };

            const completeSignup = () => {
                const newUser = {
                    email,
                    password,
                    publicKey: keypair.publicKey,
                    secretKey: keypair.secret,
                    joinedAt: new Date().toISOString()
                };
                localStorage.setItem('trustland_user', JSON.stringify(newUser));
                setUser(newUser);
                addToast("Account created successfully!", "success");
                navigate('dashboard');
            };

            const copyToClipboard = (text, label) => {
                navigator.clipboard.writeText(text);
                addToast(`${label} copied!`, "info");
            };

            return (
                <div className="max-w-xl mx-auto px-4 py-20 flex flex-col justify-center min-h-[70vh]">
                    {step === 1 ? (
                        <Card>
                            <div className="mb-10 text-center">
                                <h2 className="text-3xl font-black mb-2">Create Account</h2>
                                <p className="text-muted">Start securing property documents today</p>
                            </div>
                            <form onSubmit={generateWallet} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-bold mb-2 text-muted uppercase tracking-wider">Email Address</label>
                                    <input 
                                        type="email" 
                                        required
                                        className="w-full bg-background border border-border rounded-xl px-4 py-3 focus:border-primary outline-none transition-all text-white"
                                        placeholder="name@example.com"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold mb-2 text-muted uppercase tracking-wider">Create Password</label>
                                    <input 
                                        type="password" 
                                        required
                                        className="w-full bg-background border border-border rounded-xl px-4 py-3 focus:border-primary outline-none transition-all text-white"
                                        placeholder="••••••••"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                    />
                                </div>
                                <Button type="submit" isLoading={isLoading} className="w-full h-14 text-lg">Generate Blockchain ID</Button>
                            </form>
                            <p className="mt-8 text-center text-muted">
                                Already have an account? <button onClick={() => navigate('login')} className="text-primary hover:underline font-bold">Sign In</button>
                            </p>
                        </Card>
                    ) : (
                        <Card className="border-t-4 border-t-secondary animate-in zoom-in-95 duration-500">
                            <div className="mb-10 text-center">
                                <div className="w-16 h-16 bg-secondary/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-secondary/20">
                                    <Icon name="key" className="text-secondary" />
                                </div>
                                <h2 className="text-3xl font-black mb-2">Your Stellar Identity</h2>
                                <p className="text-muted">This is your unique blockchain keypair. Save it carefully.</p>
                            </div>
                            
                            <div className="space-y-6">
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-muted uppercase">Public Address (Safe to Share)</label>
                                    <div className="flex gap-2">
                                        <div className="flex-grow bg-background border border-border rounded-xl px-4 py-3 font-mono text-sm break-all">
                                            {keypair.publicKey}
                                        </div>
                                        <button onClick={() => copyToClipboard(keypair.publicKey, "Public Key")} className="p-3 bg-surface hover:text-primary border border-border rounded-xl">
                                            <Icon name="copy" size={20} />
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-2 p-4 bg-danger/5 border border-danger/20 rounded-xl">
                                    <label className="text-xs font-bold text-danger uppercase flex items-center gap-2">
                                        <Icon name="alert-triangle" size={14} /> Secret Key (NEVER SHARE)
                                    </label>
                                    <div className="flex gap-2">
                                        <div className="flex-grow bg-background border border-danger/20 rounded-xl px-4 py-3 font-mono text-sm blur-sm hover:blur-none transition-all cursor-help break-all">
                                            {keypair.secret}
                                        </div>

                try {
                    const newHashes = [];
                    for (const file of selectedFiles) {
                        const buffer = await file.arrayBuffer();
                        const hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
                        const hashArray = Array.from(new Uint8Array(hashBuffer));
                        const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
                        newHashes.push(hashHex);
                    }
                    setHashes(newHashes);
                    setStep(2);

                try {
                    const server = new StellarSdk.Horizon.Server("https://horizon-testnet.stellar.org");
                    const account = await server.loadAccount(user.publicKey);
                    const newDocs = [];

                    for (let i = 0; i < hashes.length; i++) {
                        const currentHash = hashes[i];
                        const currentFile = files[i];
                        
                        const tx = new StellarSdk.TransactionBuilder(account, {
                            fee: StellarSdk.BASE_FEE,
                            networkPassphrase: StellarSdk.Networks.TESTNET
                        })
                        .addOperation(StellarSdk.Operation.manageData({
                            name: `hash_${i}`,
                            value: currentHash.substring(0, 64)
                        }))
                        .addMemo(StellarSdk.Memo.text(currentHash.substring(0, 28)))
                        .setTimeout(30)
                        .build();

            const handleVerify = async (e) => {
                const selectedFile = e.target.files[0];
                if (!selectedFile) return;
                
                setIsLoading(true);
                setResult(null);
                
                try {
                    // 1. Hash local file
                    const buffer = await selectedFile.arrayBuffer();
                    const hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
                    setHash(hashHex);

                    // 2. Search local storage (for fast lookup)
                    const localDocs = JSON.parse(localStorage.getItem('trustland_documents') || '[]');
                    const match = localDocs.find(d => d.hash === hashHex);

                    // 3. Search On-Chain (Advanced Verification)
                    // Note: In a real app, we'd query an indexer. Here we search Horizon or just trust the local storage lookup for demo.
                    // For authentic feel, let's simulate a network search
                    setTimeout(() => {
                        if (match) {
                            setResult({ status: 'verified', doc: match });
                            addToast("Document Authenticity Verified!", "success");
                        } else {
                            setResult({ status: 'unverified' });
                            addToast("No matching record found on-chain", "warning");
                        }
                        setIsLoading(false);
                    }, 2000);

                } catch (err) {
                    addToast("Verification failed", "error");
                    setIsLoading(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-20 flex flex-col items-center">

                        <div className="w-20 h-20 bg-secondary/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-secondary/20 border-dashed">

                        </div>
                        <h1 className="text-5xl font-black mb-4 tracking-tight">Public Verification</h1>
                        <p className="text-xl text-muted max-w-2xl mx-auto">
                            Upload any legal document to verify its cryptographic signature on the Stellar Protocol.
                        </p>
                    </div>

                    {!result ? (
                        <div className="w-full max-w-2xl">
                            <label className={`flex flex-col items-center justify-center w-full h-80 border-2 border-dashed border-border rounded-3xl cursor-pointer hover:bg-surface/50 hover:border-secondary/50 transition-all group ${isLoading ? 'opacity-50 pointer-events-none' : ''}`}>
                                {isLoading ? (
                                    <div className="flex flex-col items-center">
                                        <div className="w-16 h-16 border-4 border-secondary/20 border-t-secondary rounded-full animate-spin mb-6"></div>
                                        <p className="text-xl font-bold">Scanning Global Ledger...</p>
                                        <p className="text-muted mt-2">Connecting to Testnet Horizon</p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center">
                                        <Icon name="upload-cloud" size={48} className="text-secondary mb-6 group-hover:scale-110 transition-transform" />
                                        <p className="text-xl font-bold mb-2">Drop document to verify</p>
                                        <p className="text-sm text-muted">Original files only. Scans are anonymous.</p>
                                        <Button variant="secondary" className="mt-8">Select Document</Button>
                                    </div>
                                )}
                                <input type="file" className="hidden" onChange={handleVerify} disabled={isLoading} />
                            </label>
                            
                            <div className="mt-12 grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                                <div className="flex gap-4">
                                    <div className="shrink-0 w-10 h-10 rounded-lg bg-surface flex items-center justify-center border border-border"><Icon name="cpu" size={18} /></div>
                                    <div>
                                        <h4 className="font-bold mb-1">Algorithmic Match</h4>
                                        <p className="text-xs text-muted">We use industry-standard SHA-256 to ensure zero collisions.</p>
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <div className="shrink-0 w-10 h-10 rounded-lg bg-surface flex items-center justify-center border border-border"><Icon name="clock" size={18} /></div>
                                    <div>
                                        <h4 className="font-bold mb-1">Time-Stamped Evidence</h4>
                                        <p className="text-xs text-muted">Verified documents show exactly when they were anchored on-chain.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="w-full max-w-2xl animate-in zoom-in-95 duration-500">
                            {result.status === 'verified' ? (
                                <Card className="border-t-4 border-t-secondary bg-secondary/[0.02]">
                                    <div className="flex flex-col items-center text-center p-4">
                                        <div className="w-20 h-20 bg-secondary rounded-full flex items-center justify-center mb-6 shadow-xl shadow-secondary/20">
                                            <Icon name="check" size={40} className="text-white" />
                                        </div>
                                        <h2 className="text-3xl font-black text-secondary mb-2 uppercase tracking-tighter italic">Document Verified</h2>
                                        <p className="text-muted mb-8">This document is authentic and currently registered on the Stellar blockchain.</p>
                                        
                                        <div className="w-full space-y-4 text-left p-6 bg-surface/50 rounded-2xl border border-border">
                                            <div className="flex justify-between items-center text-sm border-b border-border/50 pb-2">
                                                <span className="text-muted font-bold uppercase tracking-wider text-xs">Property Title</span>
                                                <span className="font-bold">{result.doc.name}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-sm border-b border-border/50 pb-2">
                                                <span className="text-muted font-bold uppercase tracking-wider text-xs">Location</span>
                                                <span className="font-bold">{result.doc.location}</span>
                                            </div>
                                            {result.doc.surveyId && (
                                                <div className="flex justify-between items-center text-sm border-b border-border/50 pb-2">
                                                    <span className="text-muted font-bold uppercase tracking-wider text-xs">Survey ID</span>
                                                    <span className="font-bold text-secondary">{result.doc.surveyId}</span>
                                                </div>
                                            )}
                                            {result.doc.coordinates && (
                                                <div className="flex justify-between items-center text-sm border-b border-border/50 pb-2">
                                                    <span className="text-muted font-bold uppercase tracking-wider text-xs">GPS Coordinates</span>
                                                    <span className="font-bold text-primary">{result.doc.coordinates}</span>
                                                </div>
                                            )}
                                            {result.doc.ownerId && (
                                                <div className="flex justify-between items-center text-sm border-b border-border/50 pb-2">
                                                    <span className="text-muted font-bold uppercase tracking-wider text-xs">Reg. Owner ID</span>
                                                    <span className="font-bold">{result.doc.ownerId}</span>
                                                </div>
                                            )}
                                            <div className="flex justify-between items-center text-sm border-b border-border/50 pb-2">
                                                <span className="text-muted font-bold uppercase tracking-wider text-xs">Registry Date</span>
                                                <span className="font-bold">{new Date(result.doc.timestamp).toLocaleString()}</span>
                                            </div>
                                            <div className="flex flex-col gap-2 pt-2">
                                                <span className="text-muted font-bold uppercase tracking-wider text-xs">SHA-256 Sign-off</span>
                                                <code className="text-[10px] bg-background p-2 rounded border border-border text-secondary font-mono break-all">{result.doc.hash}</code>
                                            </div>
                                        </div>
                                        
                                        <div className="mt-8 flex gap-4 w-full">
                                            <Button variant="secondary" className="flex-grow" onClick={() => setResult(null)}>Verify Another</Button>
                                            <Button className="flex-grow" onClick={() => window.open(`https://stellar.expert/explorer/testnet/tx/${result.doc.txId}`, '_blank')}>View Proof on Explorer</Button>
                                        </div>
                                    </div>
                                </Card>
                            ) : (
                                <Card className="border-t-4 border-t-danger bg-danger/[0.02]">
                                    <div className="flex flex-col items-center text-center p-4">
                                        <div className="w-20 h-20 bg-danger rounded-full flex items-center justify-center mb-6 shadow-xl shadow-danger/20">
                                            <Icon name="alert-triangle" size={40} className="text-white" />
                                        </div>
                                        <h2 className="text-3xl font-black text-danger mb-2 uppercase tracking-tighter italic">Verification Failed</h2>
                                        <p className="text-muted mb-8 italic">CAUTION: This document hash does not match any record on our global land registry.</p>
                                        
                                        <div className="w-full text-left p-6 bg-surface/50 rounded-2xl border border-danger/20 mb-8">
                                            <p className="text-xs font-bold text-muted uppercase mb-2">Submitted Hash</p>
                                            <code className="text-xs font-mono text-danger break-all">{hash}</code>
                                        </div>

                                        <Button className="w-full h-14" variant="danger" onClick={() => setResult(null)}>Retry with Different File</Button>
                                    </div>
                                </Card>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
